<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI NEXUS // CONDUCTOR TERMINAL</title>
    <style>
        :root {
            --bg: #000000;
            --surface: #0a0a0a;
            --border: #222222;
            --text: #ffffff;
            --accent: #00ff00;
            --danger: #ff0000;
            --font-mono: 'Geist Mono', 'Courier New', Courier, monospace;
        }

        body { margin: 0; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font-mono); text-transform: uppercase; font-size: 12px; letter-spacing: 0.05em; }
        
        #header { position: absolute; top: 24px; left: 24px; border-left: 1px solid #fff; padding-left: 16px; z-index: 50; }
        h1 { font-size: 16px; margin: 0; font-weight: 500; }
        .version { font-size: 9px; opacity: 0.4; margin-top: 4px; display: block; }

        #info-panel { position: absolute; top: 24px; right: 24px; background: var(--surface); padding: 16px; border: 1px solid var(--border); width: 360px; z-index: 50; line-height: 1.5; max-height: 76vh; overflow: auto; }
        #catalog-panel { position: absolute; top: 106px; left: 24px; width: 360px; max-height: 62vh; overflow: auto; background: rgba(10,10,10,0.94); border: 1px solid var(--border); padding: 12px; z-index: 50; }
        #stats-panel { position: absolute; top: 24px; left: 50%; transform: translateX(-50%); background: rgba(10,10,10,0.9); border: 1px solid var(--border); padding: 10px 14px; z-index: 50; display: flex; gap: 16px; font-size: 10px; }
        .stat { opacity: 0.9; }
        .stat b { color: #8cf7c7; font-weight: 600; }
        .panel-title { font-size: 10px; letter-spacing: 0.08em; opacity: 0.7; margin-bottom: 8px; }
        #search-centers { width: 100%; box-sizing: border-box; background: #050505; color: #fff; border: 1px solid var(--border); padding: 8px; font: inherit; margin-bottom: 10px; }
        .center-row { border: 1px solid var(--border); padding: 8px; margin-bottom: 8px; cursor: pointer; background: #070707; }
        .center-row:hover { border-color: #7df0b5; background: #0e1a14; }
        .center-name { font-size: 11px; margin-bottom: 4px; color: #d7ffe8; }
        .center-meta { font-size: 9px; opacity: 0.72; line-height: 1.4; }
        #info-panel a { color: #8fecc1; text-decoration: underline; }
        .chip { display: inline-block; padding: 2px 6px; border: 1px solid #2b5; margin: 0 4px 4px 0; font-size: 9px; }
        
        #ctrl-btns { position: absolute; bottom: 24px; left: 24px; z-index: 50; display: flex; flex-direction: column; gap: 8px; }
        
        button { background: var(--surface); color: var(--text); border: 1px solid var(--border); padding: 12px 20px; cursor: pointer; font-family: inherit; font-size: 10px; transition: all 0.2s; text-align: left; }
        button:hover { border-color: #fff; background: #111; }
        
        #hint { position: absolute; bottom: 24px; right: 24px; font-size: 9px; opacity: 0.3; }
        canvas { display: block; }

        /* Scrollbar hide */
        ::-webkit-scrollbar { display: none; }

        @media (max-width: 900px) {
            #header { top: 14px; left: 14px; padding-left: 10px; }
            #stats-panel { top: 72px; left: 14px; transform: none; right: 14px; width: auto; justify-content: space-between; }
            #catalog-panel { display: none; }
            #info-panel { top: 126px; right: 14px; left: 14px; width: auto; padding: 12px; font-size: 10px; max-height: 48vh; }
            #ctrl-btns { left: 14px; bottom: 14px; right: 14px; }
            button { width: 100%; }
            #hint { display: none; }
            h1 { font-size: 14px; }
        }
    </style>
</head>
<body>
    <div id="header">
        <h1>AI NEXUS // CONDUCTOR</h1>
        <span class="version">TERMINAL VER. 8.0 // GLOBAL INFRA INTEL ACTIVE</span>
    </div>

    <div id="stats-panel">
        <div class="stat">SITES: <b id="stat-sites">0</b></div>
        <div class="stat">EST. POWER: <b id="stat-power">0 MW</b></div>
        <div class="stat">OPERATIONAL: <b id="stat-operational">0</b></div>
    </div>

    <div id="catalog-panel">
        <div class="panel-title">GLOBAL AI DATA CENTER INDEX</div>
        <input id="search-centers" placeholder="SEARCH REGION / OPERATOR / MODEL" />
        <div id="center-list"></div>
    </div>

    <div id="info-panel">
        [SYSTEM ONLINE]<br>SELECT A SITE FOR FULL IMPACT + MODEL BREAKDOWN.
    </div>

    <div id="ctrl-btns">
        <button onclick="toggleLoop()">[MODE] TOGGLE MONEY LOOP (ANIMATED)</button>
        <button onclick="toggleChinaFlow()">[MODE] TOGGLE CHINA FLOW LAYER</button>
        <button onclick="window.location.reload()">[CMD] REBOOT TERMINAL</button>
    </div>

    <div id="hint">MOUSE_LEFT: ROTATE // SCROLL: ZOOM // CLICK: SELECT_NODE (LARGE HIT AREA)</div>
    <script type="module" src="./main.js"></script>
</body>
</html>
