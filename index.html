<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI NEXUS // CONDUCTOR TERMINAL</title>
    <style>
        :root {
            --bg: #000000;
            --surface: #0a0a0a;
            --border: #222222;
            --text: #ffffff;
            --accent: #00ff00;
            --danger: #ff0000;
            --font-mono: 'Geist Mono', 'Courier New', Courier, monospace;
        }

        body { margin: 0; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font-mono); text-transform: uppercase; font-size: 12px; letter-spacing: 0.05em; }
        
        #header { position: absolute; top: 24px; left: 24px; border-left: 1px solid #fff; padding-left: 16px; z-index: 50; }
        h1 { font-size: 16px; margin: 0; font-weight: 500; }
        .version { font-size: 9px; opacity: 0.4; margin-top: 4px; display: block; }

        #info-panel { position: absolute; top: 24px; right: 24px; background: var(--surface); padding: 20px; border: 1px solid var(--border); width: 280px; z-index: 50; line-height: 1.6; min-height: 100px; }
        
        #ctrl-btns { position: absolute; bottom: 24px; left: 24px; z-index: 50; display: flex; flex-direction: column; gap: 8px; }
        
        button { background: var(--surface); color: var(--text); border: 1px solid var(--border); padding: 12px 20px; cursor: pointer; font-family: inherit; font-size: 10px; transition: all 0.2s; text-align: left; }
        button:hover { border-color: #fff; background: #111; }
        
        #hint { position: absolute; bottom: 24px; right: 24px; font-size: 9px; opacity: 0.3; }
        canvas { display: block; }

        /* Scrollbar hide */
        ::-webkit-scrollbar { display: none; }

        @media (max-width: 900px) {
            #header { top: 14px; left: 14px; padding-left: 10px; }
            #info-panel { top: 14px; right: 14px; width: min(72vw, 280px); padding: 12px; font-size: 10px; min-height: 88px; }
            #ctrl-btns { left: 14px; bottom: 14px; }
            #hint { display: none; }
            h1 { font-size: 14px; }
        }
    </style>
  <script type="module" crossorigin src="/three-ai-world/assets/index-DnxgnoyR.js"></script>
</head>
<body>
    <div id="header">
        <h1>AI NEXUS // CONDUCTOR</h1>
        <span class="version">TERMINAL VER. 7.0 // ORBIT_PROTOCOL ACTIVE</span>
    </div>

    <div id="info-panel">
        [SYSTEM ONLINE]<br>CLICK A GLOBAL NODE TO INITIALIZE DATA STREAM.
    </div>

    <div id="ctrl-btns">
        <button onclick="toggleLoop()">[MODE] TOGGLE MONEY LOOP (ANIMATED)</button>
        <button onclick="window.location.reload()">[CMD] REBOOT TERMINAL</button>
    </div>

    <div id="hint">MOUSE_LEFT: ROTATE // SCROLL: ZOOM // CLICK: SELECT_NODE</div>
</body>
</html>
