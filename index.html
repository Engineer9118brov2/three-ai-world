<!DOCTYPE html>
<html>
<head>
    <title>AI NEXUS // CONDUCTOR</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; color: #fff; font-family: 'Courier New', Courier, monospace; text-transform: uppercase; }
        #ui { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); text-align: center; width: 80%; }
        #info-panel { position: absolute; top: 20px; right: 20px; background: #000; padding: 15px; border: 1px solid #fff; width: 300px; font-size: 12px; letter-spacing: 1px; }
        #stats-bar { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 40px; background: #000; padding: 10px 30px; border: 1px solid #fff; }
        .stat-item { text-align: center; }
        .stat-val { font-size: 20px; font-weight: bold; }
        .stat-label { font-size: 9px; margin-top: 5px; opacity: 0.6; }
        #search-bar { position: absolute; top: 100px; left: 20px; }
        #search-bar input { background: #000; border: 1px solid #fff; color: #fff; padding: 10px; font-family: inherit; width: 200px; }
        #space-alert { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; opacity: 0; transition: opacity 1s; pointer-events: none; border: 1px solid #fff; padding: 40px; background: #000; }
        #space-alert h1 { font-size: 40px; margin: 0; }
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]:focus { outline: none; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 1px; cursor: pointer; background: #fff; }
        input[type=range]::-webkit-slider-thumb { height: 15px; width: 15px; background: #fff; cursor: pointer; -webkit-appearance: none; margin-top: -7px; }
        #header { position: absolute; top: 20px; left: 20px; border-left: 2px solid #fff; padding-left: 15px; }
        h1 { font-size: 18px; margin: 0; letter-spacing: 2px; }
        p { font-size: 10px; margin: 5px 0 0 0; opacity: 0.8; }
    </style>
</head>
<body>
    <div id="header">
        <h1>AI NEXUS // CONDUCTOR</h1>
        <p>INFRASTRUCTURE TRACKER VER. 2.0</p>
    </div>

    <div id="search-bar">
        <input type="text" placeholder="FILTER BY COMPANY/HW" oninput="handleSearch(this.value)">
    </div>

    <div id="stats-bar">
        <div class="stat-item">
            <div id="total-power" class="stat-val">0 MW</div>
            <div class="stat-label">GRID LOAD</div>
        </div>
        <div class="stat-item">
            <div id="gpu-count" class="stat-val">0</div>
            <div class="stat-label">EST. GPU UNITS</div>
        </div>
    </div>

    <div id="info-panel">
        [SYSTEM READY] SELECT TIMELINE UNIT
    </div>

    <div id="space-alert">
        <h1>THE NEXT FRONTIER: SPACE</h1>
        <p>COOLED BY THE VOID. POWERED BY THE SUN.</p>
    </div>

    <div id="ui">
        <h2 id="date-label">2024-01</h2>
        <input type="range" min="0" max="14" value="0" oninput="updateTimeline(this.value)">
        <p style="font-size: 8px; margin-top: 15px;">SCROLL TO ACCESS ORBITAL NODE</p>
    </div>
    <script type="module" src="/main.js"></script>
</body>
</html>
